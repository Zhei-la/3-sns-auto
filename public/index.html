<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 자동화 허브</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0b;
  --bg2: #111113;
  --bg3: #1a1a1e;
  --gold: #c9a96e;
  --gold-dim: rgba(201,169,110,0.1);
  --gold-border: rgba(201,169,110,0.2);
  --text: #f0ede8;
  --text2: #9e9b95;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.logo {
  font-family: 'Noto Serif KR', serif;
  font-size: 13px;
  color: var(--gold);
  letter-spacing: .15em;
  text-transform: uppercase;
  margin-bottom: 32px;
  opacity: .7;
}
h1 {
  font-family: 'Noto Serif KR', serif;
  font-size: clamp(26px, 5vw, 42px);
  font-weight: 700;
  text-align: center;
  line-height: 1.3;
  margin-bottom: 12px;
}
h1 em { color: var(--gold); font-style: normal; }
.sub {
  font-size: 14px;
  color: var(--text2);
  text-align: center;
  margin-bottom: 48px;
  line-height: 1.7;
}
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 16px;
  width: 100%;
  max-width: 820px;
}
.card {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 28px 24px;
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
  display: flex;
  flex-direction: column;
  gap: 12px;
  color: var(--text);
}
.card:hover {
  border-color: var(--gold-border);
  background: var(--gold-dim);
  transform: translateY(-3px);
  box-shadow: 0 8px 32px rgba(201,169,110,0.08);
}
.card-icon { font-size: 32px; }
.card-name {
  font-size: 17px;
  font-weight: 700;
}
.card-desc {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.6;
  flex: 1;
}
.card-cta {
  font-size: 12px;
  color: var(--gold);
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 4px;
  margin-top: 4px;
}
.card-cta::after { content: '→'; transition: transform .2s; }
.card:hover .card-cta::after { transform: translateX(4px); }
.card-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 99px;
  background: var(--gold-dim);
  border: 1px solid var(--gold-border);
  color: var(--gold);
  width: fit-content;
}
@media (max-width: 520px) {
  .cards { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="logo">AI Automation Hub</div>
<h1>세 가지 <em>AI 도구</em>를<br>한 곳에서</h1>
<p class="sub">블로그 원고 · 카페 글 · 스레드 자동화</p>

<div class="cards">
  <a class="card" href="/blog">
    <div class="card-icon">📝</div>
    <div class="card-badge">AI 생성</div>
    <div class="card-name">블로그 원고</div>
    <div class="card-desc">네이버 블로그 SEO 최적화 원고를 AI가 자동으로 생성합니다</div>
    <div class="card-cta">바로가기</div>
  </a>
  <a class="card" href="/cafe">
    <div class="card-icon">☕</div>
    <div class="card-badge">AI 생성</div>
    <div class="card-name">카페 글</div>
    <div class="card-desc">네이버 카페에 올릴 자연스러운 글을 카테고리별로 작성합니다</div>
    <div class="card-cta">바로가기</div>
  </a>
  <a class="card" href="https://zheiia-thread.up.railway.app/" target="_blank">
    <div class="card-icon">🧵</div>
    <div class="card-badge">자동화</div>
    <div class="card-name">스레드 자동화</div>
    <div class="card-desc">Threads SNS 게시물 자동 생성 및 예약 발행 시스템</div>
    <div class="card-cta">바로가기</div>
  </a>
</div>

</body>
</html>
